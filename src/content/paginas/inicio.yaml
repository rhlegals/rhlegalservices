zona_hero:
  titulo_es: "Tu vida en Colombia, protegida y en orden"
  titulo_en: "Your life in Colombia, protected and in order"
  subtitulo_es: "Abogados expertos en visas y registro de marca en Colombia para extranjeros y emprendedores."
  subtitulo_en: "Expert attorneys in visas and trademark registration in Colombia for foreigners and entrepreneurs."
  aclaracion_es: "Firma legal privada. No somos una entidad gubernamental."
  aclaracion_en: "Private legal firm. We are not a government entity."
