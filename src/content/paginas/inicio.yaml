seccion_porque_rh:
  titulo_es: "Seguridad jurídica en cada paso"
  titulo_en: "Legal certainty at every step"
  descripcion_es: "Somos la firma de confianza para extranjeros e inversionistas que buscan certeza legal en Colombia."
  descripcion_en: "We are the trusted firm for foreigners and investors seeking legal certainty in Colombia."
  pilares:
    - icono: "balanza"
      titulo_es: "Especialización real"
      titulo_en: "True specialization"
      texto_es: "Abogados con profundo conocimiento en migratorio, marcario y corporativo. Sin generalistas."
      texto_en: "Attorneys with deep expertise in immigration, trademark, and corporate law. No generalists."
    - icono: "globo"
      titulo_es: "Servicio bilingüe"
      titulo_en: "Bilingual service"
      texto_es: "Atendemos en español e inglés, eliminando barreras para nuestros clientes internacionales."
      texto_en: "We serve in Spanish and English, removing barriers for our international clients."
    - icono: "escudo"
      titulo_es: "Transparencia total"
      titulo_en: "Full transparency"
      texto_es: "Tarifas claras desde el inicio y comunicación constante durante todo el proceso."
      texto_en: "Clear fees from the start and constant communication throughout the process."
    - icono: "cronometro"
      titulo_es: "Agilidad probada"
      titulo_en: "Proven agility"
      texto_es: "Procesos optimizados para cumplir plazos y evitar retrasos costosos en tus trámites."
      texto_en: "Optimized processes to meet deadlines and avoid costly delays in your procedures."
    - icono: "manos"
      titulo_es: "Relación a largo plazo"
      titulo_en: "Long-term relationship"
      texto_es: "No somos un trámite puntual. Acompañamos el crecimiento de personas y empresas en Colombia."
      texto_en: "We are not a one-time transaction. We accompany the growth of people and companies in Colombia."
    - icono: "candado"
      titulo_es: "Confidencialidad garantizada"
      titulo_en: "Guaranteed confidentiality"
      texto_es: "Tus datos e información sensible están protegidos bajo estrictos estándares de privacidad."
      texto_en: "Your data and sensitive information are protected under strict privacy standards."

