zona_hero:
  titulo_es: "Una firma construida sobre experiencia y principios"
  titulo_en: "A firm built on experience and principles"
  descripcion_es: "R&H Legal Services es una firma jurídica privada colombiana especializada en acompañar a personas naturales, familias y empresas extranjeras e inversionistas en sus procesos legales en Colombia."
  descripcion_en: "R&H Legal Services is a private Colombian law firm specialized in supporting individuals, families, foreign companies and investors in their legal processes in Colombia."
  imagen_fondo: "/images/legal-library.jpg"

seccion_historia:
  titulo_es: "Fundada para servir a quienes eligen Colombia"
  titulo_en: "Founded to serve those who choose Colombia"
  parrafos_es:
    - "R&H Legal Services nació de la convicción de que los extranjeros que deciden vivir, trabajar o invertir en Colombia merecen asesoría legal de primer nivel: clara, ética y eficiente."
    - "Durante años, nuestra fundadora Ximena Holguín Reyes identificó una brecha importante en el mercado: clientes internacionales que navegaban el sistema jurídico colombiano sin orientación adecuada, enfrentando rechazos, multas y pérdidas de tiempo evitables. De esa necesidad surgió la firma."
    - "Hoy, R&H Legal Services opera como una firma boutique de alto desempeño, atendiendo a clientes en más de 20 países con un enfoque bilingüe, personalizado y orientado a resultados concretos y medibles."
  parrafos_en:
    - "R&H Legal Services was born from the conviction that foreigners who decide to live, work, or invest in Colombia deserve top-tier legal advice: clear, ethical, and efficient."
    - "For years, our founder Ximena Holguín Reyes identified an important gap in the market: international clients navigating the Colombian legal system without adequate guidance, facing rejections, fines, and avoidable delays. The firm was born out of that need."
    - "Today, R&H Legal Services operates as a high-performance boutique firm, serving clients in over 20 countries with a bilingual, personalized approach focused on concrete, measurable results."
  imagen_lateral: "/images/office-team.jpg"

seccion_mision_valores:
  titulo_es: "Lo que nos define como firma"
  titulo_en: "What defines us as a firm"
  items:
    - icono: "diamante"
      titulo_es: "Misión"
      titulo_en: "Mission"
      texto_es: "Brindar asesoría jurídica especializada, transparente y efectiva a personas y empresas extranjeras que interactúan con el sistema legal colombiano, garantizando resultados confiables y relaciones de largo plazo."
      texto_en: "To provide specialized, transparent, and effective legal advice to individuals and foreign companies interacting with the Colombian legal system, ensuring reliable results and long-term relationships."
    - icono: "brujula"
      titulo_es: "Visión"
      titulo_en: "Vision"
      texto_es: "Ser la firma de referencia en Colombia para clientes internacionales que requieren servicios legales en derecho migratorio, propiedad intelectual y derecho corporativo."
      texto_en: "To be the reference firm in Colombia for international clients requiring legal services in immigration law, intellectual property, and corporate law."
    - icono: "balanza"
      titulo_es: "Ética Profesional"
      titulo_en: "Professional Ethics"
      texto_es: "Actuamos con absoluta integridad. No prometemos resultados garantizados, sino honestidad total sobre cada caso y la mejor estrategia disponible."
      texto_en: "We act with absolute integrity. We do not promise guaranteed outcomes, but total honesty about each case and the best available strategy."
    - icono: "globo"
      titulo_es: "Perspectiva Internacional"
      titulo_en: "International Perspective"
      texto_es: "Entendemos las necesidades y expectativas de los clientes internacionales. Nuestra comunicación bilingüe elimina malentendidos y genera confianza real."
      texto_en: "We understand the needs and expectations of international clients. Our bilingual communication eliminates misunderstandings and builds genuine trust."
    - icono: "cronometro"
      titulo_es: "Eficiencia"
      titulo_en: "Efficiency"
      texto_es: "Valoramos el tiempo de nuestros clientes. Procesos claros, plazos definidos y comunicación proactiva son nuestra forma de trabajar."
      texto_en: "We value our clients' time. Clear processes, defined deadlines, and proactive communication are our way of working."
    - icono: "manos"
      titulo_es: "Relación Duradera"
      titulo_en: "Lasting Relationship"
      texto_es: "No buscamos clientes transaccionales. Construimos relaciones de confianza que acompañan el crecimiento de personas y empresas en Colombia."
      texto_en: "We do not seek transactional clients. We build relationships of trust that accompany the growth of people and companies in Colombia."

seccion_equipo:
  titulo_es: "NUESTRO EQUIPO"
  titulo_en: "OUR TEAM"
  subtitulo_es: "La abogada detrás de tu caso"
  subtitulo_en: "The attorney behind your case"
  nombre: "MARIA XIMENA RIVERA H."
  cargo_es: "Abogada — Derecho Comercial, Civil y Migratorio"
  cargo_en: "Attorney — Commercial, Civil & Immigration Law"
  bio_es:
    - "Ximena es abogada egresada de la Pontificia Universidad Javeriana de Cali y Magíster en Gestión Estratégica y Negocios Internacionales de la Universidad de Sevilla en España."
    - "Por más de 10 años se ha desempeñado como abogada independiente en Colombia adquiriendo gran experiencia en áreas de Derecho Comercial, Civil y Migratorio. Igualmente ha sido asesora de negocios en empresas de Estados Unidos y España. Ximena es abogada y empresaria orientada al beneficio de los demás y al trabajo en equipo. Mentora y booster de emprendedores de la Incubadora CAMPUS NOVA de la Pontificia Universidad Javeriana – Cali."
  bio_en:
    - "Ximena holds a law degree from the Pontificia Universidad Javeriana de Cali and a Master's in Strategic Management and International Business from the Universidad de Sevilla in Spain."
    - "For over 10 years she has practiced as an independent attorney in Colombia, gaining extensive experience in Commercial, Civil, and Immigration Law. She has also served as a business advisor for companies in the United States and Spain. Ximena is an attorney and entrepreneur driven by a commitment to others and teamwork. She is a mentor and booster for entrepreneurs at the CAMPUS NOVA Incubator of the Pontificia Universidad Javeriana – Cali."
  imagen_perfil: "/images/XimenaPerfil-BW-1.webp"
  datos_contacto:
    email: "info@rhlegalservices.com"
    linkedin: "ximenariverarhlegalservices"
    ubicacion: "Cali, Valle del Cauca, Colombia"
  etiquetas_practica:
    - "Derecho Comercial"
    - "Derecho Civil"
    - "Derecho Migratorio"
    - "Negocios Internacionales"

