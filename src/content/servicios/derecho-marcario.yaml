meta:
  id: "derecho-marcario"
  slug: "derecho-marcario"
  orden: 1

tarjeta_inicio:
  titulo_es: "Derecho Marcario y Propiedad Intelectual"
  titulo_en: "Trademark Law & Intellectual Property"
  mini_descripcion_es: "Registro y protección de marcas ante la SIC, patentes y derechos de autor. Búsqueda de anterioridad, clases de Niza, defensa y renovación."
  mini_descripcion_en: "Trademark registration and protection before the SIC, patents and copyrights. Prior art search, Nice classes, defense and renewal."
  imagen_fondo_tarjeta: "/images/trademark-ip-sm.jpg"
  alt_es: "Registro de propiedad intelectual y marcas"
  alt_en: "Intellectual property and trademark registration"

pagina_interna:
  hero_titulo_es: "Registra tu marca en Colombia y protege tu mayor activo"
  hero_titulo_en: "Register your trademark in Colombia and protect your greatest asset"
  hero_imagen_fondo: "/images/trademark-ip.jpg"
  introduccion_es: "Gestión integral ante la SIC: búsqueda de anterioridad, clasificación de Niza, radicación, vigilancia y defensa de tu propiedad intelectual."
  introduccion_en: "Comprehensive management before the SIC: prior art search, Nice classification, filing, monitoring and defense of your intellectual property."
  bloques_contenido:
    - titulo_es: "Búsqueda de Anterioridad"
      titulo_en: "Prior Art Search"
      texto_es: "Revisamos la base de datos de la SIC para detectar marcas idénticas o similares antes de invertir en el registro."
      texto_en: "We review the SIC database to detect identical or similar marks before investing in registration."
    - titulo_es: "Clasificación de Niza"
      titulo_en: "Nice Classification"
      texto_es: "Determinamos las clases exactas que protegen tu negocio según la Clasificación Internacional de Niza."
      texto_en: "We determine the exact classes that protect your business according to the International Nice Classification."
    - titulo_es: "Radicación ante la SIC"
      titulo_en: "Filing before the SIC"
      texto_es: "Preparamos y radicamos tu solicitud con documentación impecable para maximizar la aprobación."
      texto_en: "We prepare and file your application with impeccable documentation to maximize approval."
    - titulo_es: "Defensa ante Oposiciones"
      titulo_en: "Defense against Oppositions"
      texto_es: "Si un tercero se opone a tu registro, presentamos los argumentos y pruebas necesarios para defender tu marca."
      texto_en: "If a third party opposes your registration, we present the arguments and evidence necessary to defend your mark."
    - titulo_es: "Renovación de Marcas"
      titulo_en: "Trademark Renewal"
      texto_es: "Gestionamos la renovación de tu registro cada 10 años para mantener tu protección activa."
      texto_en: "We manage the renewal of your registration every 10 years to keep your protection active."
    - titulo_es: "Marcas Extranjeras en Colombia"
      titulo_en: "Foreign Trademarks in Colombia"
      texto_es: "Registramos marcas de empresas y emprendedores extranjeros sin necesidad de presencia física en Colombia."
      texto_en: "We register trademarks for foreign companies and entrepreneurs without requiring physical presence in Colombia."
  seccion_faq:
    - pregunta_es: "¿Qué se necesita para registrar una marca en Colombia?"
      pregunta_en: "What is needed to register a trademark in Colombia?"
      respuesta_es: "Para registrar una marca en Colombia ante la Superintendencia de Industria y Comercio (SIC) se requiere el nombre o denominación de la marca, selección de la(s) clase(s) de Niza, datos del solicitante, pago de tasas oficiales y archivo de imagen si contiene diseño gráfico."
      respuesta_en: "To register a trademark in Colombia before the SIC you need the brand name, selection of Nice class(es), applicant data, payment of official fees, and image file if it contains a graphic design."
    - pregunta_es: "¿Cuánto cuesta registrar una marca en Colombia?"
      pregunta_en: "How much does it cost to register a trademark in Colombia?"
      respuesta_es: "El costo varía según el número de clases de Niza. La tarifa oficial de la SIC es de aproximadamente $1.195.000 COP por clase para una marca nueva, más los honorarios profesionales de la firma."
      respuesta_en: "The cost varies depending on the number of Nice classes. The official SIC fee is approximately $1,195,000 COP per class for a new trademark, plus professional fees."
    - pregunta_es: "¿Cuánto tiempo tarda el registro de una marca?"
      pregunta_en: "How long does trademark registration take?"
      respuesta_es: "El proceso completo tarda aproximadamente 8 a 12 meses desde la fecha de solicitud, incluyendo examen formal, publicación en Gaceta, examen de fondo y resolución de concesión. El registro tiene vigencia de 10 años renovables."
      respuesta_en: "The complete process takes approximately 8 to 12 months from the application date, including formal examination, Gazette publication, substantive examination, and grant resolution. Registration is valid for 10 renewable years."
    - pregunta_es: "¿Puedo registrar una marca en Colombia desde el extranjero?"
      pregunta_en: "Can I register a trademark in Colombia from abroad?"
      respuesta_es: "Sí, es completamente posible. Únicamente se requiere otorgar un poder especial notariado a favor de nuestra firma para actuar como apoderada ante la SIC."
      respuesta_en: "Yes, it is entirely possible. You only need to grant a notarized special power of attorney to our firm to act as your representative before the SIC."
