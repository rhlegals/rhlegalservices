meta:
  id: "derecho-migratorio"
  slug: "derecho-migratorio"
  orden: 2

tarjeta_inicio:
  titulo_es: "Derecho Migratorio y Visas"
  titulo_en: "Immigration Law & Visas"
  mini_descripcion_es: "Asesoría sobre tipo de visa, gestión de requisitos, preparación documental, cédula de extranjería, renovaciones, prórrogas y nacionalidad colombiana."
  mini_descripcion_en: "Advisory on visa type, requirements management, document preparation, foreigner ID card, renewals, extensions and Colombian nationality."
  imagen_fondo_tarjeta: "/images/immigration-passport-sm.jpg"
  alt_es: "Pasaporte y documentos de migración en Colombia"
  alt_en: "Passport and immigration documents in Colombia"

pagina_interna:
  hero_titulo_es: "Tu visa en Colombia, aprobada sin contratiempos"
  hero_titulo_en: "Your Colombian visa, approved without setbacks"
  hero_imagen_fondo: "/images/immigration-passport.jpg"
  introduccion_es: "Gestionamos visas de residencia, trabajo e inversión con documentación impecable para maximizar tu tasa de aprobación."
  introduccion_en: "We manage residence, work and investment visas with impeccable documentation to maximize your approval rate."
  bloques_contenido:
    - titulo_es: "Diagnóstico de elegibilidad"
      titulo_en: "Eligibility assessment"
      texto_es: "Evaluamos tu perfil y la visa más adecuada para tu situación personal y objetivos en Colombia."
      texto_en: "We evaluate your profile and the most appropriate visa for your personal situation and goals in Colombia."
    - titulo_es: "Preparación documental"
      titulo_en: "Document preparation"
      texto_es: "Reunimos y verificamos cada documento con los requisitos actualizados del sistema migratorio colombiano."
      texto_en: "We gather and verify each document against the updated requirements of the Colombian immigration system."
    - titulo_es: "Radicación y seguimiento"
      titulo_en: "Filing and monitoring"
      texto_es: "Presentamos la solicitud y monitoreamos el proceso hasta la aprobación final de tu visa."
      texto_en: "We file your application and monitor the process through to final visa approval."
    - titulo_es: "Asesoría post-visa"
      titulo_en: "Post-visa advisory"
      texto_es: "Te orientamos sobre obligaciones legales y próximos pasos tras la aprobación de tu visa en Colombia."
      texto_en: "We guide you on legal obligations and next steps after your Colombian visa is approved."
  seccion_faq:
    - pregunta_es: "¿Qué tipos de visa maneja RH Legal Services?"
      pregunta_en: "What types of visas does RH Legal Services handle?"
      respuesta_es: "Gestionamos visas V (Visitante), M (Migrante), R (Residente), visas de inversionista, nómada digital y reunificación familiar, cubriendo la mayoría de categorías del sistema migratorio colombiano vigente."
      respuesta_en: "We handle V (Visitor), M (Migrant), R (Resident) visas, investor visas, digital nomad visas and family reunification, covering most categories of the current Colombian immigration system."
    - pregunta_es: "¿Cuánto tiempo tarda el proceso de visa?"
      pregunta_en: "How long does the visa process take?"
      respuesta_es: "Los tiempos varían según el tipo de visa y la documentación disponible. En general, el proceso de radicación ante Cancillería tarda entre 5 y 15 días hábiles. La preparación documental previa puede tomar 2 a 4 semanas adicionales."
      respuesta_en: "Processing times vary depending on the visa type and available documentation. Generally, filing with the Foreign Ministry takes 5 to 15 business days. Prior document preparation may take an additional 2 to 4 weeks."
    - pregunta_es: "¿Pueden ayudarme si mi visa fue rechazada anteriormente?"
      pregunta_en: "Can you help me if my visa was previously rejected?"
      respuesta_es: "Sí. Analizamos los motivos del rechazo anterior, corregimos las deficiencias documentales y presentamos una nueva solicitud con una estrategia optimizada para maximizar las posibilidades de aprobación."
      respuesta_en: "Yes. We analyze the reasons for the prior rejection, correct any documentary deficiencies, and file a new application with an optimized strategy to maximize approval chances."
