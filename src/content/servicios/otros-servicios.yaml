meta:
  id: "otros-servicios"
  slug: "otros-servicios"
  orden: 3

tarjeta_inicio:
  titulo_es: "Derecho Corporativo y Civil"
  titulo_en: "Corporate & Civil Law"
  mini_descripcion_es: "Contratos comerciales nacionales e internacionales, constitución de sociedades, asuntos civiles y de familia para colombianos y extranjeros."
  mini_descripcion_en: "National and international commercial contracts, company formation, civil and family matters for Colombians and foreigners."
  imagen_fondo_tarjeta: "/images/corporate-team-sm.jpg"
  alt_es: "Equipo de abogados corporativos en reunión"
  alt_en: "Corporate attorneys team in meeting"

pagina_interna:
  hero_titulo_es: "Soluciones legales para empresas y personas"
  hero_titulo_en: "Legal solutions for businesses and individuals"
  hero_imagen_fondo: "/images/corporate-team.jpg"
  introduccion_es: "Soporte jurídico continuo para empresas, emprendedores y personas: contratos, sociedades, asuntos civiles y de familia en Colombia."
  introduccion_en: "Ongoing legal support for companies, entrepreneurs, and individuals: contracts, corporate structures, civil and family matters in Colombia."
  bloques_contenido:
    - titulo_es: "Contratos Comerciales"
      titulo_en: "Commercial Contracts"
      texto_es: "Asesoría, negociación, redacción y revisión de contratos nacionales e internacionales: suministro, franquicias, distribución, arrendamiento comercial, NDA y joint ventures."
      texto_en: "Advisory, negotiation, drafting and review of domestic and international contracts: supply agreements, franchises, distribution, commercial leases, NDAs and joint ventures."
    - titulo_es: "Constitución de Sociedades"
      titulo_en: "Company Formation"
      texto_es: "Constitución, disolución, liquidación y reformas de sociedades (SAS, S.A., Ltda.) y entidades sin ánimo de lucro. Registro mercantil ante la Cámara de Comercio."
      texto_en: "Incorporation, dissolution, liquidation and restructuring of companies (SAS, S.A., Ltda.) and non-profit entities. Commercial registry with the Chamber of Commerce."
    - titulo_es: "Divorcios y Liquidación de Sociedad Conyugal"
      titulo_en: "Divorce & Marital Property Dissolution"
      texto_es: "Trámite de divorcio contencioso o por mutuo acuerdo, liquidación y distribución de bienes de la sociedad conyugal."
      texto_en: "Contested or mutual-consent divorce proceedings, and dissolution and distribution of marital property."
    - titulo_es: "Sucesiones, Testamentos y Donaciones"
      titulo_en: "Wills, Estates & Donations"
      texto_es: "Elaboración de testamentos, procesos sucesorales (intestados o testados) y donaciones de bienes. Incluye sucesiones de colombianos en el exterior."
      texto_en: "Drafting of wills, estate proceedings (intestate or testate), and property donations. Includes estates of Colombians living abroad."
    - titulo_es: "Due Diligence Legal"
      titulo_en: "Legal Due Diligence"
      texto_es: "Auditoría jurídica completa de empresas para operaciones de M&A, fusiones, adquisiciones e inversiones extranjeras en Colombia."
      texto_en: "Comprehensive legal audit of companies for M&A transactions, mergers, acquisitions, and foreign investments in Colombia."
    - titulo_es: "Representación Legal Continua"
      titulo_en: "Ongoing Legal Representation"
      texto_es: "Actuamos como departamento jurídico externo de tu empresa: contratos recurrentes, consultas legales, gestiones ante entidades y seguimiento regulatorio."
      texto_en: "We act as your external legal department: recurring contracts, legal queries, filings with public entities, and regulatory monitoring."
